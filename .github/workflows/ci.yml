name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The vendored PyO3 extension binds the sbol-rs crates (edition 2024),
      # so building the package needs a recent Rust toolchain.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      # Builds the Rust extension via maturin as part of the editable install.
      - name: Sync dependencies
        run: uv sync --extra dev

      - name: isort
        run: uv run isort --check-only --diff .

      - name: black
        run: uv run black --check --diff .

      - name: flake8
        run: uv run flake8 .

      # Type-check against the real dependencies (torch, transformers, wandb)
      # installed in the synced environment.
      - name: mypy
        run: uv run mypy --config-file=pyproject.toml

      - name: pytest
        run: uv run pytest
