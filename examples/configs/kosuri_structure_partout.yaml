# Kosuri promoter x RBS composability: structure-aware encoder.
# Each feature span (promoter, RBS) is wrapped with role-keyed boundary tokens
# plus an orientation marker, so the model sees the part decomposition. Only the
# encoder block differs from the flat-sequence cell.
seed: 42
output_dir: runs/kosuri_structure_partout

corpus:
  source: sbol
  path: data/kosuri/sbol
  label_key: prot

tokenizer:
  kind: kmer
  k: 3
  stride: 1
  max_length: 96

encoder:
  kind: structure_aware
  mark_orientation: true

model:
  from_scratch: true        # the structure-aware vocab extends the base k-mer vocab
  hidden_size: 256
  arch:
    model_type: bert
    num_hidden_layers: 4
    num_attention_heads: 4
    intermediate_size: 512
    max_position_embeddings: 160

task:
  kind: supervised
  objective: regression

splits:
  strategy: column
  column: split_partout

train:
  batch_size: 128
  epochs: 40
  lr: 1.0e-3
  weight_decay: 0.01
  amp: false
  early_stop:
    monitor: val_mae
    mode: min
    patience: 6
