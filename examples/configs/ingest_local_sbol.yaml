# Train a structure-aware model on real SBOL3 normalized from other formats.
#
# Unlike the synthetic configs, this reads a directory of SBOL3 files. Produce it
# first by normalizing the bundled GenBank demo with the `sbol` CLI:
#
#   python examples/normalize_and_ingest.py
#
# which writes examples/data/normalized/. You can then materialize or train from
# the CLI:
#
#   sboltorch ingest examples/configs/ingest_local_sbol.yaml
#   sboltorch train  examples/configs/ingest_local_sbol.yaml
seed: 42
output_dir: runs/ingest_local_sbol

corpus:
  source: local
  path: examples/data/normalized
  fmt: sbol
  cache_dir: .sboltorch_cache

tokenizer:
  kind: kmer
  k: 6
  max_length: 512

encoder:
  kind: structure_aware
  mark_orientation: true

model:
  from_scratch: true        # the structure-aware vocab extends the base k-mer vocab
  hidden_size: 256

task:
  kind: mlm

training:
  epochs: 1
  batch_size: 4
